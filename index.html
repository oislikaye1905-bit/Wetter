<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Wetter App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>Wetter App</h1>

    <div class="search">
      <input type="text" id="cityInput" placeholder="Stadt eingeben">
      <button onclick="getWeather()">Suchen</button>
    </div>

    <div id="weatherBox" class="weather-box">
      <p>Gib eine Stadt ein, um das Wetter zu sehen.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
